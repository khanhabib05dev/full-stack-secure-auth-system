services:
  db:
    image: postgres:17
    container_name: postgres-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - db-store:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mydb -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: node-server
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:5000"

    command: npm run dev

    depends_on:
      db:
        condition: service_healthy

    volumes:
      - .:/app
      - /app/node_modules

volumes:
  db-store: